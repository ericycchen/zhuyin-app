<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body>
    <div id="output"></div>
    <script type="module">
        import { toBopomofo } from 'https://cdn.jsdelivr.net/npm/bopomofo@0.2.0/+esm';
        let out = document.getElementById('output');
        try {
            out.innerHTML += 'bopomofo: ' + toBopomofo('你好，世界') + '<br>';
        } catch(e) {
            out.innerHTML += e.toString();
        }
    </script>
</body>
</html>
